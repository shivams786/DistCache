services:
  cache-node-1:
    build: .
    environment:
      NODE_ID: cache-node-1
      HTTP_PORT: 8080
      GRPC_PORT: 9090
      CLUSTER_NODES: cache-node-1:9090,cache-node-2:9090,cache-node-3:9090
      CACHE_MAX_ENTRIES: 10000
      DEFAULT_TTL: 300s
      CACHE_CLEANUP_INTERVAL: 5s
      MAX_VALUE_BYTES: 1048576
      REPLICATION_FACTOR: 2
      REPLICATION_WORKERS: 8
      REPLICATION_QUEUE: 1000
      REPLICATION_RETRIES: 3
      VIRTUAL_NODES: 100
      HEALTH_CHECK_INTERVAL: 2s
      HEALTH_CHECK_TIMEOUT: 500ms
      HEALTH_FAILURE_THRESHOLD: 3
      HEALTH_RECOVERY_THRESHOLD: 2
      REQUEST_TIMEOUT: 750ms
      GRACEFUL_SHUTDOWN_TIMEOUT: 10s
      RECOVERY_SYNC_BATCH_SIZE: 250
      RECOVERY_SYNC_TIMEOUT: 30s
      MAX_CONCURRENT_RECOVERY: 2
      HTTP_READ_TIMEOUT: 3s
      HTTP_WRITE_TIMEOUT: 5s
      HTTP_IDLE_TIMEOUT: 30s
      MAX_FORWARDING_HOPS: 1
    ports:
      - "8081:8080"

  cache-node-2:
    build: .
    environment:
      NODE_ID: cache-node-2
      HTTP_PORT: 8080
      GRPC_PORT: 9090
      CLUSTER_NODES: cache-node-1:9090,cache-node-2:9090,cache-node-3:9090
      CACHE_MAX_ENTRIES: 10000
      DEFAULT_TTL: 300s
      CACHE_CLEANUP_INTERVAL: 5s
      MAX_VALUE_BYTES: 1048576
      REPLICATION_FACTOR: 2
      REPLICATION_WORKERS: 8
      REPLICATION_QUEUE: 1000
      REPLICATION_RETRIES: 3
      VIRTUAL_NODES: 100
      HEALTH_CHECK_INTERVAL: 2s
      HEALTH_CHECK_TIMEOUT: 500ms
      HEALTH_FAILURE_THRESHOLD: 3
      HEALTH_RECOVERY_THRESHOLD: 2
      REQUEST_TIMEOUT: 750ms
      GRACEFUL_SHUTDOWN_TIMEOUT: 10s
      RECOVERY_SYNC_BATCH_SIZE: 250
      RECOVERY_SYNC_TIMEOUT: 30s
      MAX_CONCURRENT_RECOVERY: 2
      HTTP_READ_TIMEOUT: 3s
      HTTP_WRITE_TIMEOUT: 5s
      HTTP_IDLE_TIMEOUT: 30s
      MAX_FORWARDING_HOPS: 1
    ports:
      - "8082:8080"

  cache-node-3:
    build: .
    environment:
      NODE_ID: cache-node-3
      HTTP_PORT: 8080
      GRPC_PORT: 9090
      CLUSTER_NODES: cache-node-1:9090,cache-node-2:9090,cache-node-3:9090
      CACHE_MAX_ENTRIES: 10000
      DEFAULT_TTL: 300s
      CACHE_CLEANUP_INTERVAL: 5s
      MAX_VALUE_BYTES: 1048576
      REPLICATION_FACTOR: 2
      REPLICATION_WORKERS: 8
      REPLICATION_QUEUE: 1000
      REPLICATION_RETRIES: 3
      VIRTUAL_NODES: 100
      HEALTH_CHECK_INTERVAL: 2s
      HEALTH_CHECK_TIMEOUT: 500ms
      HEALTH_FAILURE_THRESHOLD: 3
      HEALTH_RECOVERY_THRESHOLD: 2
      REQUEST_TIMEOUT: 750ms
      GRACEFUL_SHUTDOWN_TIMEOUT: 10s
      RECOVERY_SYNC_BATCH_SIZE: 250
      RECOVERY_SYNC_TIMEOUT: 30s
      MAX_CONCURRENT_RECOVERY: 2
      HTTP_READ_TIMEOUT: 3s
      HTTP_WRITE_TIMEOUT: 5s
      HTTP_IDLE_TIMEOUT: 30s
      MAX_FORWARDING_HOPS: 1
    ports:
      - "8083:8080"

  prometheus:
    image: prom/prometheus:v2.53.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./deployments/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9095:9090"
    depends_on:
      - cache-node-1
      - cache-node-2
      - cache-node-3
